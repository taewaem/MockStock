<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" href="../bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8; /* 배경색 */
            font-family: 'Arial', sans-serif;
            color: #333;
            line-height: 1.6;
        }

        .header {
            background-color: #6699ff; /* 상단 배경색 */
            padding: 20px;
            color: white;
            text-align: center;
            font-size: 2.5em; /* 헤더 글씨 크기 조정 */
        }
        h2 {
            margin-top: 20px; /* 상단 여백 */
            margin-left: 150px; /* 왼쪽 여백 */
            margin-bottom: 20px; /* 하단 여백 */
            position: relative;
        }
        .term-container {
            max-width: 1200px; /* 최대 너비 설정 */
            margin: 20px auto; /* 중앙 정렬 */
            padding: 20px;
            background: white; /* 배경색 */
            border-radius: 10px; /* 모서리 둥글게 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* 그림자 */
        }

        .term {
            display: block; /* 블록 형태로 변경 */
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            padding: 10px;
            border-bottom: 1px solid #e9ecef; /* 하단 경계선 */
            transition: background-color 0.3s; /* 배경색 변화 애니메이션 */
        }

        .term:last-child {
            border-bottom: none; /* 마지막 항목은 경계선 제거 */
        }

        .term:hover {
            background-color: #f1f1f1; /* 호버 시 배경색 */
        }

        .description {
            display: none;
            margin-top: 5px;
            padding: 10px;
            background-color: #f8f9fa; /* 설명 배경색 */
            border: 1px solid #ced4da; /* 설명 테두리 */
            border-radius: 5px; /* 모서리 둥글게 */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* 그림자 */
        }
    </style>
    <title>기초 용어</title>
</head>
<body>
<div class="header">
    <a th:href="@{/}" style="text-decoration: none; color: white;">
        <h1>모의 주식</h1>
    </a>
</div>
