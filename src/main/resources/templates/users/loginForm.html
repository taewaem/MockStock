<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link th:href="@{/bootstrap/css/bootstrap.min.css}"
          href="../bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
        max-width: 560px;
        }
        .field-error {
        border-color: #dc3545;
        color: #dc3545;
        }
                .header {
            background-color: #6699ff; /* 상단 배경색 */
            padding: 20px;
            color: white;
            text-align: center;
            font-size: 2.5em; /* 헤더 글씨 크기 조정 */
        }
    </style>
</head>

<body>
<div class="header">
    <a th:href="@{/}" style="text-decoration: none; color: white;">
        <h1>모의 주식</h1>
    </a>
</div>

<div class="container">
    <div class="py-5 text-center">
        <h2>로그인</h2>
    </div>
    <form action="" th:action th:object="${loginForm}" method="post">

        <div>
            <label for="loginId">ID</label>
            <input type="text" id="loginId" th:field="*{loginId}" class="form-control"
                   th:errorclass="field-error">
            <div class="field-error" th:errors="*{loginId}" />
        </div>
        <div>
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}"
                   class="form-control"
                   th:errorclass="field-error">
            <div class="field-error" th:errors="*{password}" />
        </div>

        <!-- 전역 오류 메시지 추가 -->
        <div class="alert alert-danger" role="alert"
             th:if="${#fields.hasGlobalErrors()}" th:errors="*{global}">
            <!-- 전역 오류 메시지 표시 -->
        </div>


        <hr class="my-4">
        <div class="row">
            <div class="col">
                <button class="w-100 btn btn-primary btn-lg" type="submit">
                    로그인</button>
            </div>
            <div class="col">
                <button class="w-100 btn btn-secondary btn-lg"
                        th:onclick="|location.href='@{/}'|"
                        type="button">취소</button>
            </div>
        </div>
    </form>
</div> <!-- /container -->
</body>
</html>
